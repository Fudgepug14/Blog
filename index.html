<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  background-image: linear-gradient(to bottom, rgb(57, 70, 71), rgb(38, 51, 35));
}

/* Header/Blog Title */
.header {
  padding: 0px 0% 0px;
  font-size: 80px;
  text-align: center;
}

.headertext {
  font-family: Impact;
  font-style: italic;
  position: absolute;
  top: 20%;
  left: 60%;
  transform: translate(-20%, -50%);
  color: white
}

.mainblog {   
  float: left;
  width: 100%;
}

.image {
  background-color: #aaa;
  width: 5%;
  padding: 5px;
}

/* Add a card effect for articles */
.card {
   background-color: white;
   padding: 20px;
   margin-top: 20px;
}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Footer */
.footer {
  padding: 20px;
  text-align: center;
  background: #ddd;
  margin-top: 20px;
}

/* Responsive layout - when the screen is less than 800px wide, make the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 800px) {
  .leftcolumn, .rightcolumn {   
    width: 100%;
    padding: 0;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class ="headertext">
    <h2>kakeblog</h2>
  </div>
  <img src="andrew.png" alt="me" style="width:1440px;height:1200px;">
</div>

<div class="row">
  <div class="mainblog">
    <div class="card">
      <h2>Welcome</h2>
      <p>Nothing to see here.. yet.....</p>

      <div class="counter-container">
        <button onclick="decrement()">-</button>
        <input type="number" id="counter" value="0">
        <button onclick="increment()">+</button>
      </div>

      <script>
        function increment() {
          document.getElementById('counter').stepUp();
        }
        function decrement() {
          document.getElementById('counter').stepDown();
        }
      </script>

      <div>
        <h1>Votes: <span id="count">0</span></h1>
        <button onclick="vote()">Vote</button>

        <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js"></script>

        <script>
          const firebaseConfig = {
            apiKey: "AIzaSyAIlr1JF9bkO9rB84t0zM8iW4f6ToAA8Ac",
            databaseURL: "https://blogdatabase-f649c-default-rtdb.firebaseio.com/",
            projectId: "blogdatabase-f649c"
          };

          const app = firebase.initializeApp(firebaseConfig);
          const db = firebase.database();
          const countRef = db.ref("votes");

          // Listen for changes (real-time updates)
          countRef.on("value", (snapshot) => {
            document.getElementById("count").innerText = snapshot.val() || 0;
          });
          
          function vote() {
            countRef.set(5);
            countRef.transaction((current) => (current || 0) + 1);
          }
        </script>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <h2>Hey whats up?</h2>
</div>

</body>
</html>
