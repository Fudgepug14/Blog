<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  background-image: linear-gradient(to bottom, rgb(57, 70, 71), rgb(38, 51, 35));
}

/* Header/Blog Title */
.header {
  padding: 0px 0% 0px;
  font-size: 80px;
  text-align: center;
}

.headertext {
  font-family: Impact;
  font-style: italic;
  position: absolute;
  top: 20%;
  left: 60%;
  transform: translate(-20%, -50%);
  color: white
}

.mainblog {   
  float: left;
  width: 100%;
}

.image {
  background-color: #aaa;
  width: 5%;
  padding: 5px;
}

/* Add a card effect for articles */
.card {
   background-color: white;
   padding: 20px;
   margin-top: 20px;
}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Footer */
.footer {
  padding: 20px;
  text-align: center;
  background: #ddd;
  margin-top: 20px;
}

/* Responsive layout - when the screen is less than 800px wide, make the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 800px) {
  .leftcolumn, .rightcolumn {   
    width: 100%;
    padding: 0;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class ="headertext">
    <h2>kakeblog</h2>
  </div>
  <img src="andrew.png" alt="me" style="width:1440px;height:1200px;">
</div>

<div class="row">
  <div class="mainblog">
    <div class="card">
      <h2>Welcome</h2>
      <p>Nothing to see here.. yet.....</p>
    </div>
  </div>
</div>

<div class="footer">
  <h2>Hey whats up?</h2>
</div>

</body>
</html>
