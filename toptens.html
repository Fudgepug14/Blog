<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  background-image: linear-gradient(to bottom, rgb(137, 184, 187), rgb(64, 68, 63));
}

.header {
  padding: 300px 0% 0px;
  font-size: 80px;
  text-align: center;
}

.headertext {
  font-family: Impact;
  font-style: italic;
  position: absolute;
  top: 10%;
  left: 60%;
  transform: translate(-20%, -50%);
  color: white
}

.mainblog {   
  float: left;
  width: 100%;
}

.image {
  background-color: #aaa;
  width: 5%;
  padding: 5px;
}

/* Add a card effect for articles */
.card {
   background-color: white;
   padding: 20px;
   margin-top: 20px;
}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Footer */
.footer {
  padding: 20px;
  text-align: center;
  background: #ddd;
  margin-top: 20px;
}

/* Responsive layout - when the screen is less than 800px wide, make the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 800px) {
  .leftcolumn, .rightcolumn {   
    width: 100%;
    padding: 0;
  }
}
</style>

<title>kakeblog</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

</head>
<body>

<div class="header">
  <div class ="headertext">
    <h2>Top Tens</h2>
  </div>
</div>

<div class="row">
  <div class="mainblog">
    <div class="card">
      <p>Idk</p>
    </div>
  </div>
</div>

<div class="footer">
    <h2><a href="https://kakeblog.vercel.app">Home</a></h2>

</div>

</body>
</html>
